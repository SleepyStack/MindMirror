spring.application.name=ai_mindmirror
app.ngrok.url=
# TruGen API Configuration
trugen.api.key=
#Sarvam API Configuration
sarvam.api.key=

webhook.secret.token=

# Database connection settings
spring.datasource.url=jdbc:postgresql://localhost:5432/mindmirrordb
spring.datasource.username=postgres
spring.datasource.password=12345

# --- JWT Configuration (Injected via Env Vars) ---
jwt.secret=dpqgUlBNoisndcUjkLsab0LDSrZuL54UGX9cRTQxkys

# Defaults to 1 day (86400000 ms) if not explicitly injected
jwt.expiration=${JWT_EXPIRATION:86400000}
# Flyway configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Hibernate configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# --- Spring Boot Actuator Configuration ---
# Expose actuator endpoints over the web (use "*" to expose all, or comma-separated list)
management.endpoints.web.exposure.include=*

management.endpoint.health.show-details=always

# --- Debug Logging for Spring Security & Web ---
# Shows the exact security filter chain and why a request was denied
logging.level.org.springframework.security=TRACE
# Shows the raw incoming HTTP requests and routing
logging.level.org.springframework.web=DEBUG
# (Optional) Shows Hibernate SQL bindings if you want to see the exact DB queries
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s