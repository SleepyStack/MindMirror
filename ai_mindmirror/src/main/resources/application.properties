spring.application.name=ai_mindmirror
app.ngrok.url=${APP_NGROK_URL:http://localhost:8080}
# TruGen API Configuration
trugen.api.key=${TRUGEN_API_KEY}
trugen.agent.id=${TRUGEN_AGENT_ID}

webhook.secret.token=${WEBHOOK_SECRET_TOKEN}

# Database connection settings
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# --- JWT Configuration (Injected via Env Vars) ---
jwt.secret=${JWT_SECRET}
# Defaults to 1 day (86400000 ms) if not explicitly injected
jwt.expiration=${JWT_EXPIRATION:86400000}
# Flyway configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Hibernate configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# --- Spring Boot Actuator Configuration ---
# Expose actuator endpoints over the web (use "*" to expose all, or comma-separated list)
management.endpoints.web.exposure.include=*

management.endpoint.health.show-details=always

# --- Debug Logging for Spring Security & Web ---
# Shows the exact security filter chain and why a request was denied
logging.level.org.springframework.security=TRACE
# Shows the raw incoming HTTP requests and routing
logging.level.org.springframework.web=DEBUG
# (Optional) Shows Hibernate SQL bindings if you want to see the exact DB queries
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

