version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: mindmirror-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: mindmirrordb
    ports:
      - "5432:5432" # This is the magic line that exposes the DB to the Legion 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data: